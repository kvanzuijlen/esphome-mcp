name: ESPHome MCP Server (Custom)
version: 1.0.0
slug: esphome-mcp
description: >-
  Security-hardened and optimized MCP (Model Context Protocol) server exposing
  ESPHome operations as tools for Claude Code. Runs asynchronously with robust path
  validation and persistent PlatformIO caching.
url: https://github.com/kvanzuijlen/esphome-mcp
arch:
  - aarch64
  - amd64
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: MCP Streamable HTTP endpoint
map:
  - config:rw
options:
  auth_token: ""
  compile_timeout: 300
  flash_timeout: 600
  validate_timeout: 120
schema:
  auth_token: str?
  compile_timeout: int?
  flash_timeout: int?
  validate_timeout: int?
startup: application
boot: auto
init: false
host_network: false
ingress: false
panel_icon: mdi:chip
